<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conversa WhatsApp</title>

<style>
body {
 margin: 0;
 font-family: Arial;
 background: #e5ddd5;
}

.container {
 max-width: 800px;
 margin: auto;
 padding: 20px;
}

.msg {
 padding: 10px;
 margin: 6px 0;
 border-radius: 10px;
 max-width: 70%;
 word-wrap: break-word;
}

.left {
 background: white;
 text-align: left;
}

.right {
 background: #dcf8c6;
 margin-left: auto;
 text-align: left;
}

.nome {
 font-weight: bold;
 margin-bottom: 3px;
}

img, video {
 max-width: 100%;
 border-radius: 6px;
 margin-top: 5px;
}

audio {
 margin-top: 5px;
 width: 100%;
}
</style>
</head>

<body>

<div class="container" id="chat"></div>

<script>

// COLE SUA conversa.txt AQUI ENTRE AS CRASES
const texto = `COLE_AQUI_TUDO_DA_CONVERSA_TXT`;

const chat = document.getElementById('chat');

// pega primeiro nome da conversa pra usar como referência
let meuNome = null;

texto.split('\n').forEach(line => {
 if (!line.trim()) return;

 let match = line.match(/^\d{2}\/\d{2}\/\d{4}.*?- (.*?): (.*)$/);

 if (!match) return;

 let nome = match[1];
 let mensagem = match[2];

 if (!meuNome) meuNome = nome; // assume o primeiro como "você"

 let div = document.createElement('div');
 div.className = 'msg ' + (nome === meuNome ? 'right' : 'left');

 let nomeDiv = document.createElement('div');
 nomeDiv.className = 'nome';
 nomeDiv.innerText = nome;

 let textoDiv = document.createElement('div');
 textoDiv.innerText = mensagem;

 div.appendChild(nomeDiv);
 div.appendChild(textoDiv);

 // imagens
 let img = mensagem.match(/IMG-\d+.*\.(jpg|jpeg|png)/i);
 if (img) {
 let el = document.createElement('img');
 el.src = img[0];
 div.appendChild(el);
 }

 // vídeos
 let vid = mensagem.match(/VID-\d+.*\.mp4/i);
 if (vid) {
 let el = document.createElement('video');
 el.src = vid[0];
 el.controls = true;
 div.appendChild(el);
 }

 // áudios
 let aud = mensagem.match(/PTT-\d+.*\.opus/i);
 if (aud) {
 let el = document.createElement('audio');
 el.src = aud[0];
 el.controls = true;
 div.appendChild(el);
 }

 chat.appendChild(div);
});

</script>

</body>
</html>
