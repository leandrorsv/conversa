<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conversa WhatsApp</title>

<style>
body {
 font-family: Arial;
 background: #e5ddd5;
 padding: 20px;
}

.msg {
 background: white;
 padding: 10px;
 margin: 5px 0;
 border-radius: 8px;
 max-width: 600px;
}

img, video, audio {
 max-width: 250px;
 display: block;
 margin-top: 5px;
}
</style>
</head>

<body>

<h2>Conversa WhatsApp</h2>

<div id="chat"></div>

<script>
// COLE AQUI O TEXTO DA SUA conversa.txt ENTRE AS CRASES
const texto = `COLE_AQUI_TUDO_DA_CONVERSA_TXT`;

const chat = document.getElementById('chat');

texto.split('\n').forEach(line => {
 if (!line.trim()) return;

 let div = document.createElement('div');
 div.className = 'msg';
 div.innerText = line;

 // imagens
 let img = line.match(/IMG-\d+.*\.(jpg|jpeg|png)/i);
 if (img) {
 div.innerHTML += `<img src="${img[0]}">`;
 }

 // vídeos
 let vid = line.match(/VID-\d+.*\.mp4/i);
 if (vid) {
 div.innerHTML += `<video controls src="${vid[0]}"></video>`;
 }

 // áudios
 let aud = line.match(/PTT-\d+.*\.opus/i);
 if (aud) {
 div.innerHTML += `<audio controls src="${aud[0]}"></audio>`;
 }

 chat.appendChild(div);
});
</script>

</body>
</html>
