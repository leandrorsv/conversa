<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conversa WhatsApp</title>

<style>
body {
font-family: Arial;
background: #e5ddd5;
padding: 20px;
}

.msg {
background: white;
padding: 10px;
margin: 5px 0;
border-radius: 8px;
max-width: 600px;
}

img, video, audio {
max-width: 250px;
display: block;
margin-top: 5px;
}
</style>

</head>
<body>

<h2>Conversa WhatsApp</h2>

<div id="chat"></div>

<script>
fetch('conversa.txt')
.then(res => res.text())
.then(text => {

const chat = document.getElementById('chat');

text.split('\n').forEach(line => {

if (!line.trim()) return;

let div = document.createElement('div');
div.className = 'msg';
div.innerText = line;

// imagens
let img = line.match(/IMG-[\w-]+\.jpg/i);
if (img) {
div.innerHTML += `<img src="${img[0]}">`;
