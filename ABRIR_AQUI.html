Inicialmente, registra-se que o exercício do mandato de síndico encontra-se plenamente regular, amparado pela deliberação assemblear válida, observando-se os preceitos do art. 1.347 do Código Civil e as disposições da Convenção Condominial. A investidura ocorreu mediante aprovação em Assembleia regularmente convocada, inexistindo qualquer vício de forma ou de quórum que comprometa sua legitimidade.

No tocante à realização de Assembleia no primeiro trimestre de 2026, esclarece-se que circunstâncias excepcionais impactaram a formação de quórum qualificado e representativo, quais sejam: período de férias (janeiro), festividades de Carnaval (fevereiro) e chuvas intensas (março), considerando ainda a inexistência de área coberta adequada para reunião nas dependências do Condomínio.

Ressalta-se que a convocação de Assembleia deve observar não apenas os requisitos formais, mas também o princípio da razoabilidade administrativa, de modo a assegurar participação efetiva da coletividade condominial, sobretudo quando a pauta envolve matérias relevantes e estruturais.

Quanto às alegações relativas à contratação de prestadores de serviço, cumpre consignar que todos os serviços executados foram formalizados mediante emissão de nota fiscal, estando devidamente contabilizados nas respectivas prestações de contas, as quais permanecem à disposição dos condôminos para fiscalização, nos termos do art. 1.348, VIII, do Código Civil.

Não houve, em nenhuma hipótese, adiantamento indevido de valores. Os pagamentos realizados corresponderam exclusivamente aos serviços efetivamente executados, inexistindo qualquer irregularidade financeira ou administrativa.

No que se refere à eventual substituição do síndico, cumpre esclarecer que tal medida somente pode ocorrer mediante deliberação assemblear específica, observado o quórum legal previsto no art. 1.349 do Código Civil. A vontade individual de condômino, ainda que legítima, não possui eficácia jurídica para destituir administrador regularmente investido, sendo a Assembleia o órgão soberano para tal deliberação.

Quanto à questão pontual da lixeira, trata-se de fato isolado, decorrente da não coleta pela SLU em data prevista durante a Semana Santa, somado ao feriado da colaboradora responsável pela limpeza, situação devidamente regularizada na sequência. Não se trata de omissão administrativa, mas de circunstância excepcional e alheia à gestão.

No tocante à alegação de ausência de acompanhamento presencial, reitera-se que a administração exerce fiscalização contínua, com acompanhamento periódico das atividades desempenhadas por prestadora de serviço, inexistindo qualquer conduta negligente.

Relativamente aos insumos de limpeza, o controle de estoque é realizado pela subsíndica, a qual confirmou a regularidade do fornecimento. A aplicação de cera ou demais procedimentos técnicos é realizada conforme critérios operacionais e de segurança, não havendo ausência de material, mas sim gestão técnica adequada.

Cumpre destacar que o pagamento da taxa condominial constitui obrigação propter rem, decorrente da titularidade da unidade, nos termos do art. 1.336, I, do Código Civil, tratando-se de rateio das despesas ordinárias e extraordinárias aprovadas em Assembleia, não configurando liberalidade, mas dever legal.

Ademais, esta gestão implementou diversas melhorias estruturais, administrativas e financeiras, com destaque para intervenções elétricas, hidráulicas, estruturais e de segurança, além da expressiva redução do índice de inadimplência (de 25% para 4%), saneamento de débitos pretéritos e adoção de medidas judiciais preventivas visando resguardar direitos do Condomínio, evitando eventual prescrição de créditos.
